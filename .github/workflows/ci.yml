name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  CARGO_TERM_COLOR: always

jobs:
  # Fast feedback with cargo - runs first
  test-fast:
    name: Quick Tests (Cargo)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Run clippy
        run: cargo clippy --all-features -- -D warnings

      - name: Run tests
        run: cargo test --all-features --verbose

  # Build and publish nightly binary - runs on every push to master
  release-nightly:
    name: Nightly Release
    runs-on: ubuntu-latest
    needs: test-fast
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --all-features

      - name: Rename binary
        run: cp target/release/surreal-obsidian-mcp surreal-obsidian-mcp-linux-x86_64

      - name: Publish nightly release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Nightly Build
          prerelease: true
          files: surreal-obsidian-mcp-linux-x86_64

  # Comprehensive Nix validation - runs on master only (slow)
  test-nix:
    name: Nix Build & Integration
    runs-on: ubuntu-latest
    needs: test-fast
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Setup Cachix
        uses: cachix/cachix-action@v15
        with:
          name: nix-community
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Check flake
        run: nix flake check

      - name: Build with Nix (includes tests)
        run: nix build

  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run security audit
        run: |
          # Temporarily allow RSA vulnerability until SurrealDB fixes it
          # RUSTSEC-2023-0071: Marvin Attack in rsa crate (medium severity)
          # No fix available as it's in surrealdb-core -> jsonwebtoken -> rsa dependency chain
          cargo audit --ignore RUSTSEC-2023-0071
