name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: surreal-obsidian-mcp
            asset_name: surreal-obsidian-mcp-linux-x86_64

          # Linux x86_64 (musl for static linking)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact_name: surreal-obsidian-mcp
            asset_name: surreal-obsidian-mcp-linux-x86_64-musl

          # macOS x86_64 (Intel)
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: surreal-obsidian-mcp
            asset_name: surreal-obsidian-mcp-macos-x86_64

          # macOS ARM64 (Apple Silicon)
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: surreal-obsidian-mcp
            asset_name: surreal-obsidian-mcp-macos-arm64

          # Windows x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: surreal-obsidian-mcp.exe
            asset_name: surreal-obsidian-mcp-windows-x86_64.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nix (Linux/macOS only)
        if: matrix.os != 'windows-latest'
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Setup Cachix (Linux/macOS only)
        if: matrix.os != 'windows-latest'
        uses: cachix/cachix-action@v15
        with:
          name: nix-community
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Build binary with Nix (Linux x86_64 gnu)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          nix build
          cp result/bin/surreal-obsidian-mcp ${{ matrix.artifact_name }}

      - name: Build binary with Nix dev shell (other Unix targets)
        if: matrix.os != 'windows-latest' && matrix.target != 'x86_64-unknown-linux-gnu'
        run: nix develop --command cargo build --release --target ${{ matrix.target }} --features embedded

      - name: Install Rust (Windows only)
        if: matrix.os == 'windows-latest'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo (Windows only)
        if: matrix.os == 'windows-latest'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build binary with cargo (Windows only)
        if: matrix.os == 'windows-latest'
        run: cargo build --release --target ${{ matrix.target }} --features embedded

      - name: Copy binary to root (non-Nix builds)
        if: matrix.target != 'x86_64-unknown-linux-gnu'
        run: cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} ./

      - name: Strip binary (Unix, not Nix build)
        if: matrix.os != 'windows-latest' && matrix.target != 'x86_64-unknown-linux-gnu'
        run: strip ${{ matrix.artifact_name }}

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.artifact_name }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create checksums
        run: |
          cd artifacts
          for dir in */; do
            cd "$dir"
            sha256sum * > SHA256SUMS
            cd ..
          done

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    name: Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Setup Cachix
        uses: cachix/cachix-action@v15
        with:
          name: nix-community
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Build with Nix
        run: nix build

      - name: Run tests
        run: nix develop --command cargo test --all-features

      - name: Run tests (no default features)
        run: nix develop --command cargo test --no-default-features

      - name: Run clippy
        run: nix develop --command cargo clippy --all-features -- -D warnings
